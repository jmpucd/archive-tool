# Per-machine config for archive-tool.
# Copy this to ~/.config/archive-tool/config.toml on each machine that runs the orchestrator,
# and fill in the placeholders. The real config file is gitignored.

[local]
# Short label for this machine, used in log lines and the Google Sheet's "Source machine" column.
hostname_label = "REPLACE_ME"   # e.g. "laptop", "studio", "mini2"

# Paths the tool scans for projects ready to archive.
# `label` shows up in the picker; `path` is the folder to scan.
# Drives that aren't currently mounted are silently skipped.
# Each folder must contain a `.archive-source` marker file to be treated as a valid source.
archive_queue_paths = [
  { label = "Internal",     path = "/Users/REPLACE_ME/archive_queue" },
  { label = "WorkingDrive", path = "/Volumes/WorkingDrive/archive_queue" },
  { label = "PortableSSD",  path = "/Volumes/PortableSSD/archive_queue" },
]

[remote.synology]
# How this machine reaches the Synology over SSH (Tailscale IP or hostname).
host = "REPLACE_ME"
user = "REPLACE_ME"
staging_dir = "/volume1/Digitization_Files/archive-staging"

[remote.centos]
# How this machine reaches the CentOS archives box. Used for the laptop's direct
# SSH (collection picker, manifest verification). This can be a raw Tailscale
# hostname/IP, or better, a ~/.ssh/config alias that fails over between Tailscale and
# campus DNS so the tool works both on and off the campus VPN. Example alias:
#   Host digitization
#       User <you>
#       HostKeyAlias digitization
#       StrictHostKeyChecking accept-new
#   Match originalhost digitization exec "nc -z -G 2 <tailscale-ip> 22"
#       HostName <tailscale-ip>
#   Match originalhost digitization
#       HostName <box>.library.ucdavis.edu
host = "REPLACE_ME"
user = "REPLACE_ME"
archives_root = "/REPLACE_ME"   # absolute path to the archives root on CentOS

# How the *Synology* reaches CentOS. The second-leg rsync runs ON Synology and
# pushes to CentOS, so it needs whatever address Synology can route to (usually
# campus DNS, since Synology may not be on the tailnet for outbound peers).
# Leave unset to fall back to `host`.
host_from_synology = "REPLACE_ME.library.ucdavis.edu"

[remote.box]
# Optional Box upload. When set, the archive flow offers "Upload to Box?" after a
# transfer and rclone-copies the project into <rclone_remote><base_folder>/<project>
# (run on CentOS, where the rclone remote is configured). Sharing is manual; the tool
# just records who to share with. Omit this section to disable the Box prompt.
rclone_remote = "box:"      # a configured rclone remote on CentOS
base_folder = "Archives"    # base Box folder for uploaded projects

[google]
# Turn-in logging (Step 4). Omit this whole section on machines that only pick/transfer
# and shouldn't log (the flow warns and continues if it's missing).
# Service-account JSON key, downloaded from Google Cloud Console. Keep it out of git.
service_account_path = "~/.config/archive-tool/google-creds.json"
# Spreadsheet ID from the sheet URL: .../spreadsheets/d/<THIS>/edit
# The sheet must be shared with the service account's email as Editor.
sheet_id = "REPLACE_ME"

[rsync]
# Reserved for future per-config customization. The exclude list is currently
# hardcoded in archive_tool.transfer.
exclude = ["@eaDir", "lost+found", ".DS_Store", "Thumbs.db", "*.tmp"]
